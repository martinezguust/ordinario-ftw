<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - LSM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    
    <header id="encabezado">
        <div id="logo-area">
            <span id="logo-icono">🤟</span>
            <h1 id="logo-titulo">LSM Plataforma</h1>
            <p id="logo-subtitulo">Lengua de Señas Mexicana</p>
        </div>
        <nav id="navbar">
            <ul id="menu-lista">
                <li><a href="index.html"        class="nav-link">Inicio</a></li>
                <li><a href="diccionario.html"  class="nav-link">Diccionario</a></li>
                <li><a href="categorias.html"   class="nav-link">Categorías</a></li>
                <li><a href="lecciones.html"    class="nav-link">Lecciones</a></li>
                <li><a href="quiz.html"         class="nav-link activo">Quiz</a></li>
                <li><a href="recursos.html"     class="nav-link">Recursos</a></li>
                <li><a href="comunidad.html"    class="nav-link">Comunidad</a></li>
                <li><a href="acerca.html"       class="nav-link">Acerca de</a></li>
            </ul>
        </nav>
    </header>

    <section id="page-header">
        <h2 id="quiz-titulo">Cargando...</h2>
        <p  id="quiz-descripcion">Cargando...</p>
    </section>

    <!-- inicio del quiz -->
    <section id="quiz-inicio-seccion">
        <div id="quiz-info-contenedor">
        </div>
        <button id="btn-iniciar-quiz">Iniciar Quiz</button>
    </section>

    <!-- preguntas -->
    <section id="quiz-preguntas-seccion" style="display:none;">
        <div id="quiz-progreso">
            <span id="quiz-num-pregunta"></span>
            <span id="quiz-puntuacion">Puntaje: 0</span>
        </div>
        <div id="quiz-pregunta-contenedor">
            <p id="quiz-pregunta-texto"></p>
            <div id="quiz-opciones-contenedor">
            </div>
        </div>
        <p id="quiz-retroalimentacion"></p>
        <button id="btn-siguiente-pregunta" style="display:none;">Siguiente →</button>
    </section>

    <!-- resultados -->
    <section id="quiz-resultados-seccion" style="display:none;">
        <h3 id="resultado-titulo">¡Quiz terminado!</h3>
        <p id="resultado-puntaje"></p>
        <p id="resultado-mensaje"></p>
        <button id="btn-reiniciar-quiz">Intentar de nuevo</button>
    </section>


    <footer id="pie-pagina">
        <div id="footer-contenido">
            <p id="footer-texto">© 2025 Plataforma LSM</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
